spring:
  application:
    name: solar-system-monitoring
  config:
    import: optional:file:.env

solaredge:
  api:
    base-url: https://monitoringapi.solaredge.com
    version: v1    # API version
    api-key: ${SOLAREDGE_API_KEY:default_api_key}
    site-id: ${SOLAREDGE_SITE_ID:default_site_id}

logging:
  file:
    name: logs\solar-system-monitoring.log
  level:
    root: DEBUG
    solar_system_monitoring: INFO

server:
  port: ${SERVER_PORT:8080}

# Swagger UI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
